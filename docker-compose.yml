version: '3.8'
services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: flexirent
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
  api:
    build: .
    depends_on:
      - db
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=server=db;port=3306;database=flexirent;user=root;password=rootpassword;
    ports:
      - "5000:80"
volumes:
  dbdata:
